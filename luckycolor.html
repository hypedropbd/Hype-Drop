<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lucky Color - Hype-Drop</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

header{
background:#111;
color:#fff;
padding:18px;
font-size:30px;
font-weight:bold;
}

.card{
background:white;
max-width:420px;
margin:30px auto;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

#colorBox{
width:160px;
height:160px;
margin:20px auto;
border-radius:15px;
background:#ddd;
}

#colorName{
font-size:28px;
font-weight:bold;
}

button{
background:#111;
color:#fff;
padding:12px 28px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.back{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#111;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>

</head>

<body>

<header>🎨 Lucky Color</header>

<div class="card">

<h2>Today's Lucky Color</h2>

<div id="colorBox"></div>

<div id="colorName">Tap Generate</div>

<br>

<button onclick="pickColor()">Generate</button>

<br><br>

<a class="back" href="index.html">🏠 Back Home</a>

</div>

<script>

const colors=[
["Red","#ff3b30"],
["Blue","#007aff"],
["Green","#34c759"],
["Purple","#af52de"],
["Orange","#ff9500"],
["Pink","#ff2d55"],
["Yellow","#ffd60a"],
["Cyan","#32ade6"],
["Black","#222222"],
["White","#ffffff"]
];

function pickColor(){

let c=colors[Math.floor(Math.random()*colors.length)];

document.getElementById("colorBox").style.background=c[1];

document.getElementById("colorName").innerHTML=c[0];

}

</script>

</body>
</html>
