<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator - Hype-Drop</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
text-align:center;
}

header{
background:#111;
color:#fff;
padding:18px;
font-size:30px;
font-weight:bold;
}

.card{
background:#fff;
max-width:420px;
margin:30px auto;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

input{
width:90%;
padding:12px;
font-size:18px;
margin:15px 0;
}

button{
padding:12px 30px;
font-size:18px;
background:#111;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

#result{
margin-top:25px;
font-size:22px;
font-weight:bold;
line-height:1.8;
}

.back{
display:inline-block;
margin-top:25px;
background:#111;
color:white;
text-decoration:none;
padding:12px 20px;
border-radius:8px;
}
</style>

</head>

<body>

<header>🎂 Age Calculator</header>

<div class="card">

<h2>Select Your Birth Date</h2>

<input type="date" id="dob">

<br>

<button onclick="calculateAge()">Calculate</button>

<div id="result"></div>

<a class="back" href="index.html">🏠 Back Home</a>

</div>

<script>

function calculateAge(){

let dob=document.getElementById("dob").value;

if(!dob){
alert("Please select your birth date.");
return;
}

let birth=new Date(dob);

let today=new Date();

let age=today.getFullYear()-birth.getFullYear();

let m=today.getMonth()-birth.getMonth();

if(m<0 || (m===0 && today.getDate()<birth.getDate())){
age--;
}

document.getElementById("result").innerHTML=
"🎉 Your Age is <br><span style='font-size:40px;color:#009688;'>"+age+" Years</span>";

}

</script>

</body>
</html>
