<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Number - Hype-Drop</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
text-align:center;
}

header{
background:#111;
color:#fff;
padding:18px;
font-size:32px;
font-weight:bold;
}

.container{
padding:25px;
}

.card{
background:#fff;
padding:25px;
border-radius:15px;
max-width:400px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

button{
background:#111;
color:white;
padding:14px 30px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#333;
}

#result{
font-size:55px;
margin-top:25px;
font-weight:bold;
color:#009688;
}

.back{
display:inline-block;
margin-top:25px;
text-decoration:none;
background:#111;
color:#fff;
padding:12px 20px;
border-radius:8px;
}
</style>

</head>

<body>

<header>
🍀 Lucky Number
</header>

<div class="container">

<div class="card">

<h2>Your Lucky Number</h2>

<p>Press the button to discover today's lucky number.</p>

<button onclick="generateNumber()">
Generate
</button>

<div id="result">?</div>

<a class="back" href="index.html">
🏠 Back Home
</a>

</div>

</div>

<script>

function generateNumber(){

let num=Math.floor(Math.random()*99)+1;

document.getElementById("result").innerHTML=num;

}

</script>

</body>
</html>
